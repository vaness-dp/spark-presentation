  </g>
  <text x="146" y="120" font-family="DM Sans, system-ui, sans-serif" font-weight="600" font-size="28" fill="#1f1e1d">Spark</text>

  <!-- Headline -->
  <text x="72" y="320" font-family="Instrument Serif, Georgia, serif" font-size="124" fill="#1f1e1d">
