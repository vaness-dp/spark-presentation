<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf9f5"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#warmTint)" opacity="0.45"/>
  <defs>
    <radialGradient id="warmTint" cx="20%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#f4ddd0" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#faf9f5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Brand mark — 4-point spark, top-left -->
  <g transform="translate(72, 78)" fill="#c96442">
